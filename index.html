<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangman – The Revision Station</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

    --teal-dark: #00a0a3;

    --purple-light: #c4a0f0;
    --yellow: #FFD93D;
    --coral: #FF6B6B;
    --green: #4CAF50;
    --white: #FFFFFF;
    --dark: #1a1a2e;
    --shadow: 4px 4px 0px #1a1a2e;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--teal);

  .floaty { position:absolute; font-size:1.8rem; opacity:0.1; animation: float 6s ease-in-out infinite; }
  .floaty:nth-child(1){top:5%;left:3%;animation-delay:0s}
  .floaty:nth-child(2){top:15%;right:5%;animation-delay:1s}
  .floaty:nth-child(3){top:50%;left:2%;animation-delay:2s}
  .floaty:nth-child(4){top:70%;right:3%;animation-delay:0.5s}
  .floaty:nth-child(5){top:85%;left:8%;animation-delay:1.5s}
  .floaty:nth-child(6){top:35%;right:2%;animation-delay:3s}
  @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-15px) rotate(5deg)} }

  .header { text-align:center; margin-bottom:6px; animation: slideDown 0.6s ease-out; }

  .header p { color:var(--dark); font-size:0.9rem; font-weight:700; margin-top:3px; background:var(--yellow); display:inline-block; padding:3px 12px; border-radius:20px; border:2px solid var(--dark); }
  .level-screen { text-align:center; }
  .level-screen h2 { font-family:'Fredoka One',cursive; font-size:1.8rem; color:var(--dark); margin-bottom:8px; }
  .level-screen p { color:#555; font-size:1rem; margin-bottom:20px; font-weight:600; }
  .level-buttons { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .level-btn { padding:16px 28px; font-family:'Fredoka One',cursive; font-size:1.3rem; border:3px solid var(--dark); border-radius:16px; cursor:pointer; box-shadow:var(--shadow-lg); transition:all 0.15s ease; color:var(--dark); min-width:160px; }
  .level-btn:hover { transform:translate(-2px,-2px); box-shadow:8px 8px 0px var(--dark); }
  .level-btn.beginner { background:#b8f0b8; }
  .level-btn.medium { background:#ffd6a5; }
  .level-btn.advanced { background:#ffb3c6; }
  .game-screen { display:none; }
  .game-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
  .level-badge { font-family:'Fredoka One',cursive; font-size:0.9rem; padding:5px 14px; border-radius:20px; border:2px solid var(--dark); box-shadow:2px 2px 0 var(--dark); }
  .level-badge.beginner { background:#b8f0b8; }
  .level-badge.medium { background:#ffd6a5; }
  .level-badge.advanced { background:#ffb3c6; }
  .score-area { font-family:'Fredoka One',cursive; font-size:1rem; color:var(--white); text-shadow:1px 1px 0 var(--dark); }
  .hangman-wrap { display:flex; justify-content:center; margin-bottom:16px; }
  #hangmanSvg { width:120px; height:120px; }
  #hangmanSvg line, #hangmanSvg circle { stroke:var(--dark); stroke-width:4; stroke-linecap:round; fill:none; }
  .word-display { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .letter-box { width:30px; height:36px; border-bottom:3px solid var(--dark); display:flex; align-items:flex-end; justify-content:center; font-family:'Fredoka One',cursive; font-size:1.1rem; color:var(--dark); padding-bottom:2px; transition:all 0.3s ease; }
  .letter-box.space { border-bottom:none; width:16px; }
  .letter-box.revealed { color:var(--purple); }
  .letter-box.wrong-reveal { color:var(--coral); }
  .wrong-area { text-align:center; margin-bottom:16px; min-height:32px; }
  .wrong-label { font-weight:800; font-size:0.85rem; color:#888; margin-bottom:4px; }
  .wrong-letters { display:flex; justify-content:center; gap:6px; flex-wrap:wrap; }
  .wrong-letter { background:#ffd6d6; border:2px solid var(--coral); border-radius:8px; padding:2px 8px; font-family:'Fredoka One',cursive; font-size:1rem; color:var(--coral); }
  .lives-bar { display:flex; justify-content:center; gap:4px; margin-bottom:16px; }
  .heart { font-size:1.3rem; transition:all 0.3s; }
  .heart.lost { opacity:0.2; filter:grayscale(1); transform:scale(0.8); }
  .keyboard { display:flex; flex-direction:column; gap:6px; align-items:center; margin-bottom:16px; }
  .key-row { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; }
  .key-btn { width:28px; height:28px; font-family:'Fredoka One',cursive; font-size:1rem; border:2px solid var(--dark); border-radius:8px; cursor:pointer; background:var(--white); box-shadow:2px 2px 0 var(--dark); transition:all 0.1s ease; color:var(--dark); }
  .key-btn:hover:not(:disabled) { background:#f0e8ff; transform:translate(-1px,-1px); box-shadow:3px 3px 0 var(--dark); }
  .key-btn:active:not(:disabled) { transform:translate(1px,1px); box-shadow:1px 1px 0 var(--dark); }
  .key-btn.correct { background:#b8f0b8; border-color:#2d8a2d; box-shadow:2px 2px 0 #2d8a2d; color:#2d8a2d; cursor:default; }
  .key-btn.wrong { background:#ffd6d6; border-color:var(--coral); box-shadow:2px 2px 0 var(--coral); color:var(--coral); cursor:default; }
  .key-btn:disabled { cursor:default; }
  .hint-area { text-align:center; margin-bottom:12px; }
  .hint-btn { background:var(--yellow); border:2px solid var(--dark); border-radius:12px; padding:6px 16px; font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; box-shadow:var(--shadow); transition:all 0.15s; }
  .hint-btn:hover { transform:translate(-1px,-1px); box-shadow:var(--shadow-lg); }
  .hint-box { margin-top:8px; background:#f0e8ff; border:2px solid var(--purple-light); border-radius:12px; padding:10px 16px; font-size:0.95rem; font-weight:700; color:var(--dark); display:none; animation:fadeUp 0.3s ease; }
  .hint-box.show { display:block; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .result-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; align-items:center; justify-content:center; }
  .result-overlay.show { display:flex; }
  .result-card { background:var(--white); border:3px solid var(--dark); border-radius:20px; padding:32px; text-align:center; max-width:400px; width:90%; box-shadow:var(--shadow-lg); animation:fadeUp 0.4s ease; }
  .result-emoji { font-size:4rem; display:block; margin-bottom:12px; }
  .result-title { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--dark); margin-bottom:8px; }
  .result-word { font-family:'Fredoka One',cursive; font-size:1.3rem; color:var(--purple); margin-bottom:8px; }
  .result-def { font-size:0.95rem; color:#555; line-height:1.5; margin-bottom:20px; }
  .result-score { background:var(--yellow); border:2px solid var(--dark); border-radius:50px; padding:6px 20px; font-family:'Fredoka One',cursive; font-size:1.1rem; display:inline-block; margin-bottom:20px; box-shadow:var(--shadow); }
  .result-btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .play-again-btn { padding:12px 28px; font-family:'Fredoka One',cursive; font-size:1.1rem; background:var(--purple); color:var(--white); border:3px solid var(--dark); border-radius:14px; cursor:pointer; box-shadow:var(--shadow); transition:all 0.15s; }
  .play-again-btn:hover { transform:translate(-1px,-1px); box-shadow:var(--shadow-lg); background:#7f55c0; }
  .change-level-btn { padding:12px 28px; font-family:'Fredoka One',cursive; font-size:1.1rem; background:var(--yellow); color:var(--dark); border:3px solid var(--dark); border-radius:14px; cursor:pointer; box-shadow:var(--shadow); transition:all 0.15s; }
  .change-level-btn:hover { transform:translate(-1px,-1px); box-shadow:var(--shadow-lg); }
  @media(max-width:480px) { .key-btn { width:30px; height:30px; font-size:0.85rem; } .letter-box { width:28px; font-size:1.1rem; } }
</style>
</head>
<body>
<div class="floaties">

      <button class="level-btn medium" onclick="startGame('medium')">📘 Medium<br><small style="font-family:Nunito;font-size:0.75rem;font-weight:700;">B1 / B2</small></button>
      <button class="level-btn advanced" onclick="startGame('advanced')">🔥 Advanced<br><small style="font-family:Nunito;font-size:0.75rem;font-weight:700;">C1 / C2</small></button>
    </div>
  </div>
  <div id="gameScreen" class="game-screen">

    <div class="game-card" style="background:var(--white);border:3px solid var(--dark);border-radius:20px;padding:16px;box-shadow:var(--shadow-lg);">

        <svg id="hangmanSvg" viewBox="0 0 160 160">
          <line x1="20" y1="150" x2="140" y2="150"/>
          <line x1="60" y1="150" x2="60" y2="10"/>
          <line x1="60" y1="10" x2="110" y2="10"/>
          <line x1="110" y1="10" x2="110" y2="30"/>
          <circle id="h-head" cx="110" cy="42" r="12" style="display:none"/>
          <line id="h-body" x1="110" y1="54" x2="110" y2="100" style="display:none"/>
          <line id="h-la" x1="110" y1="65" x2="85" y2="85" style="display:none"/>
          <line id="h-ra" x1="110" y1="65" x2="135" y2="85" style="display:none"/>
          <line id="h-ll" x1="110" y1="100" x2="85" y2="130" style="display:none"/>
          <line id="h-rl" x1="110" y1="100" x2="135" y2="130" style="display:none"/>
          <line id="h-lf" x1="85" y1="130" x2="75" y2="122" style="display:none"/>
          <line id="h-rf" x1="135" y1="130" x2="145" y2="122" style="display:none"/>
          <line id="h-lh" x1="85" y1="85" x2="75" y2="80" style="display:none"/>
          <line id="h-rh" x1="135" y1="85" x2="145" y2="80" style="display:none"/>
        </svg>
      </div>
      <div class="lives-bar" id="livesBar"></div>
      <div class="word-display" id="wordDisplay"></div>
      <div class="wrong-area">
        <div class="wrong-label" id="wrongLabel" style="display:none">Wrong guesses:</div>
        <div class="wrong-letters" id="wrongLetters"></div>
      </div>
      <div class="hint-area">
        <button class="hint-btn" id="hintBtn" onclick="showHint()">💡 Show Hint</button>
        <div class="hint-box" id="hintBox"></div>
      </div>
      <div class="keyboard" id="keyboard"></div>
    </div>
  </div>
</div>
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <span class="result-emoji" id="resultEmoji"></span>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-word" id="resultWord"></div>
    <div class="result-def" id="resultDef"></div>
    <div class="result-score">⭐ Score: <span id="resultScore"></span></div>
    <div class="result-btns">
      <button class="play-again-btn" onclick="playAgain()">Play Again 🎮</button>
      <button class="change-level-btn" onclick="changeLevel()">Change Level</button>
    </div>
  </div>
</div>

// ─── SHUFFLE + NO-REPEAT SYSTEM ──────────────────────────────────────────────
// Each level gets its own shuffled queue. When the queue empties, it reshuffles.
const queues = { beginner: [], medium: [], advanced: [] };

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getNextWord(level) {
  if (queues[level].length === 0) {
    queues[level] = shuffleArray(words[level]);
  }
  return queues[level].pop();
}

// ─── GAME STATE ───────────────────────────────────────────────────────────────
const BODY_PARTS = ['h-head','h-body','h-la','h-ra','h-ll','h-rl','h-lf','h-rf','h-lh','h-rh'];
const MAX_WRONG = BODY_PARTS.length;
let currentWord = '';
let currentHint = '';
let guessedLetters = [];
let wrongGuesses = [];
let score = 0;
let currentLevel = 'beginner';

function startGame(level) {
  currentLevel = level;
  score = 0;
  document.getElementById('levelScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  const badge = document.getElementById('levelBadge');
  badge.textContent = level.charAt(0).toUpperCase() + level.slice(1);
  badge.className = 'level-badge ' + level;
  newRound();
}

function newRound() {
  const entry = getNextWord(currentLevel);
  currentWord = entry.word.toLowerCase();
  currentHint = entry.hint;
  guessedLetters = [];
  wrongGuesses = [];
  BODY_PARTS.forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById('hintBox').classList.remove('show');
  document.getElementById('hintBox').textContent = '';
  document.getElementById('wrongLabel').style.display = 'none';
  document.getElementById('wrongLetters').innerHTML = '';
  document.getElementById('scoreDisplay').textContent = score;
  renderWord();
  renderLives();
  renderKeyboard();
}

function renderWord() {
  const display = document.getElementById('wordDisplay');
  display.innerHTML = '';
  [...currentWord].forEach(ch => {
    const box = document.createElement('div');
    if (ch === ' ') {
      box.className = 'letter-box space';
    } else {
      box.className = 'letter-box';
      if (guessedLetters.includes(ch)) {
        box.textContent = ch.toUpperCase();
        box.classList.add('revealed');
      }
    }
    display.appendChild(box);
  });
}

function renderLives() {
  const bar = document.getElementById('livesBar');
  bar.innerHTML = '';
  for (let i = 0; i < MAX_WRONG; i++) {
    const h = document.createElement('span');
    h.className = 'heart' + (i < wrongGuesses.length ? ' lost' : '');
    h.textContent = '❤️';
    bar.appendChild(h);
  }
}

function renderKeyboard() {
  const rows = [
    ['q','w','e','r','t','y','u','i','o','p'],
    ['a','s','d','f','g','h','j','k','l'],
    ['z','x','c','v','b','n','m']
  ];
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  rows.forEach(row => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'key-row';
    row.forEach(letter => {
      const btn = document.createElement('button');
      btn.className = 'key-btn';
      btn.textContent = letter.toUpperCase();
      btn.setAttribute('data-letter', letter);
      if (guessedLetters.includes(letter)) {
        btn.classList.add(wrongGuesses.includes(letter) ? 'wrong' : 'correct');
        btn.disabled = true;
      }
      btn.onclick = () => guess(letter, btn);
      rowDiv.appendChild(btn);
    });
    kb.appendChild(rowDiv);
  });
}

function guess(letter, btn) {
  if (guessedLetters.includes(letter)) return;
  guessedLetters.push(letter);
  btn.disabled = true;
  if (currentWord.includes(letter)) {
    btn.classList.add('correct');
    renderWord();
    if (isWordComplete()) { endRound(true); }
  } else {
    btn.classList.add('wrong');
    wrongGuesses.push(letter);
    document.getElementById(BODY_PARTS[wrongGuesses.length - 1]).style.display = 'block';
    renderLives();
    document.getElementById('wrongLabel').style.display = 'block';
    const wl = document.getElementById('wrongLetters');
    const span = document.createElement('span');
    span.className = 'wrong-letter';
    span.textContent = letter.toUpperCase();
    wl.appendChild(span);
    if (wrongGuesses.length >= MAX_WRONG) { endRound(false); }
  }
}

function isWordComplete() {
  return [...currentWord].every(ch => ch === ' ' || guessedLetters.includes(ch));
}

function showHint() {
  const box = document.getElementById('hintBox');
  box.textContent = currentHint;
  box.classList.add('show');
}

function endRound(won) {
  if (won) score += Math.max(10, 50 - wrongGuesses.length * 5);
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('resultEmoji').textContent = won ? '🎉' : '😬';
  document.getElementById('resultTitle').textContent = won ? 'Well done!' : 'Unlucky!';
  document.getElementById('resultWord').textContent = currentWord.toUpperCase();
  document.getElementById('resultDef').textContent = currentHint;
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultOverlay').classList.add('show');
}

function playAgain() {
  document.getElementById('resultOverlay').classList.remove('show');
  newRound();
}

function changeLevel() {
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('levelScreen').style.display = 'block';
}
</script>
</body>
</html>
